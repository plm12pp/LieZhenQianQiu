<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>列阵千秋 - 中国历朝历代兵种策略游戏</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: #1a0f0a;
    color: #f0e6d2;
    font-family: "Microsoft YaHei", "SimSun", "STSong", sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  #gameCanvas {
    background: #2a1a10;
    box-shadow: 0 0 40px rgba(200, 150, 50, 0.3);
  }
  .ui-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    display: none;
  }
  .ui-layer.active { display: block; }
  .ui-layer > * { pointer-events: auto; }

  /* Popup overlay */
  .popup-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.75);
    display: flex;
    justify-content: center;
    align-items: center;
    pointer-events: auto;
  }
  .popup-box {
    background: linear-gradient(180deg, #3a2515 0%, #2a1a10 100%);
    border: 2px solid #c8a030;
    border-radius: 12px;
    padding: 20px;
    max-width: 85%;
    max-height: 80%;
    overflow-y: auto;
    box-shadow: 0 0 30px rgba(200, 160, 50, 0.4);
    position: relative;
  }
  .popup-title {
    font-size: 22px;
    color: #ffd700;
    text-align: center;
    margin-bottom: 15px;
    text-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
  }
  .popup-close {
    position: absolute;
    top: 8px; right: 12px;
    font-size: 24px;
    color: #c8a030;
    cursor: pointer;
    background: none; border: none;
  }

  /* Buttons */
  .btn {
    background: linear-gradient(180deg, #c8a030 0%, #a07820 100%);
    border: 2px solid #e8c860;
    color: #2a1a10;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin: 5px;
    font-family: inherit;
    transition: transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(200,160,50,0.3); }
  .btn:active { transform: translateY(0); }
  .btn-blue {
    background: linear-gradient(180deg, #3078c8 0%, #2058a0 100%);
    border-color: #60a0e8;
    color: #fff;
  }
  .btn-red {
    background: linear-gradient(180deg, #c83030 0%, #a02020 100%);
    border-color: #e86060;
    color: #fff;
  }
  .btn-green {
    background: linear-gradient(180deg, #30a050 0%, #208040 100%);
    border-color: #60d080;
    color: #fff;
  }
  .btn-small { padding: 6px 12px; font-size: 13px; }

  /* Cards */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 10px;
    margin-top: 10px;
  }
  .troop-card {
    background: #3a2515;
    border: 2px solid #8a6a30;
    border-radius: 8px;
    padding: 8px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
    position: relative;
  }
  .troop-card:hover { transform: scale(1.05); border-color: #ffd700; }
  .troop-card.selected { border-color: #ffd700; box-shadow: 0 0 12px rgba(255, 215, 0, 0.4); }
  .troop-card .rarity-common { border-color: #aaa; }
  .troop-card .rarity-rare { border-color: #4488ff; }
  .troop-card .rarity-epic { border-color: #aa44ff; }
  .troop-card .rarity-legendary { border-color: #ffaa00; }
  .troop-icon {
    width: 48px; height: 48px;
    margin: 0 auto 5px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: bold;
  }
  .troop-name { font-size: 13px; font-weight: bold; color: #ffd700; }
  .troop-dynasty { font-size: 11px; color: #c8a030; }
  .troop-stat { font-size: 11px; color: #d0c8b8; }

  /* Resource bar */
  .resource-bar {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 8px;
    background: rgba(0,0,0,0.4);
    border-radius: 20px;
    margin-bottom: 10px;
  }
  .resource-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 15px;
    font-weight: bold;
  }
  .resource-icon { font-size: 18px; }
  .resource-coin { color: #ffd700; }
  .resource-jade { color: #50e0ff; }
  .resource-token { color: #ff8080; }

  /* Notifications */
  .toast-container {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 1000;
  }
  .toast {
    background: rgba(0,0,0,0.85);
    border: 1px solid #c8a030;
    color: #ffd700;
    padding: 10px 20px;
    border-radius: 8px;
    margin-bottom: 8px;
    animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
    font-size: 14px;
    white-space: nowrap;
  }
  @keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

  /* Gacha animation */
  .gacha-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
  }
  .gacha-card-reveal {
    width: 140px;
    height: 180px;
    background: linear-gradient(180deg, #5a3a20 0%, #3a2515 100%);
    border: 3px solid #ffd700;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    animation: gachaReveal 0.6s ease;
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
  }
  @keyframes gachaReveal {
    0% { transform: scale(0) rotateY(180deg); }
    60% { transform: scale(1.1) rotateY(0); }
    100% { transform: scale(1); }
  }

  /* Scrollbar */
  .popup-box::-webkit-scrollbar { width: 6px; }
  .popup-box::-webkit-scrollbar-track { background: #2a1a10; }
  .popup-box::-webkit-scrollbar-thumb { background: #c8a030; border-radius: 3px; }

  /* Battle UI */
  .battle-ui {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 8px;
  }
  .battle-top, .battle-bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: auto;
  }
  .battle-bottom { align-items: flex-end; }
  .hp-bar {
    display: flex;
    gap: 4px;
  }
  .hp-heart {
    font-size: 24px;
    color: #ff3333;
    text-shadow: 0 0 8px rgba(255, 50, 50, 0.6);
  }
  .hp-heart.lost { color: #444; text-shadow: none; }
  .level-info {
    background: rgba(0,0,0,0.6);
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 14px;
    border: 1px solid #c8a030;
  }

  /* Troop detail modal */
  .detail-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin: 10px 0;
    font-size: 13px;
  }
  .detail-stat-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 8px;
    background: rgba(0,0,0,0.3);
    border-radius: 4px;
  }
  .detail-stat-label { color: #c8a030; }
  .detail-stat-value { color: #ffd700; font-weight: bold; }

  /* Responsive */
  @media (max-width: 600px) {
    .popup-box { padding: 12px; max-width: 95%; }
    .card-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .btn { padding: 8px 14px; font-size: 14px; }
  }
</style>
</head>

// ==================== AUDIO ENGINE ====================
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.enabled = true;
    this.init();
  }
  init() {
    try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); }
  playTone(freq, duration, type='square', vol=0.1) {
    if (!this.enabled || !this.ctx) return;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
    gain.gain.setValueAtTime(vol, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    osc.start();
    osc.stop(this.ctx.currentTime + duration);
  }
  click() { this.playTone(800, 0.08, 'sine', 0.08); }
  hover() { this.playTone(600, 0.05, 'sine', 0.04); }
  attack() { this.playTone(220, 0.15, 'sawtooth', 0.08); setTimeout(() => this.playTone(180, 0.2, 'sawtooth', 0.06), 80); }
  hit() { this.playTone(150, 0.1, 'square', 0.1); }
  win() {
    [523,659,784,1047].forEach((f,i)=>setTimeout(()=>this.playTone(f,0.3,'sine',0.12),i*120));
  }
  lose() {
    [400,350,300,250].forEach((f,i)=>setTimeout(()=>this.playTone(f,0.3,'sawtooth',0.1),i*150));
  }
  coin() { this.playTone(1200, 0.1, 'sine', 0.08); setTimeout(()=>this.playTone(1600, 0.15, 'sine', 0.06), 60); }
  gacha() {
    for(let i=0;i<8;i++) setTimeout(()=>this.playTone(400+i*100,0.08,'sine',0.06),i*60);
  }
}

// ==================== GAME STATE ====================
class GameState {
  constructor() {
    this.coins = 500;
    this.jade = 10;
    this.tokens = 0;
    this.level = 1;
    this.maxLevel = 1;
    this.wins = 0;
    this.totalBattles = 0;
    this.gachaCount = 0;
    this.upgradeCount = 0;
    this.achievements = {};
    this.inventory = [];
    this.formation = FORMATIONS[0];
    this.settings = { sound: true, music: true, difficulty: 1 };
    this.load();
    this.initStarterTroops();
  }
  initStarterTroops() {
    if (this.inventory.length === 0) {
      this.addTroop("troop_knife");
      this.addTroop("troop_spear");
      this.addTroop("troop_archer");
      this.addTroop("troop_shield");
      this.addTroop("troop_light_cavalry");
    }
  }
  addTroop(troopId) {
    const base = TROOPS_DATA.troops.find(t => t.id === troopId);
    if (!base) return null;
    const existing = this.inventory.find(i => i.id === troopId);
    if (existing) {
      existing.count = (existing.count || 1) + 1;
      return existing;
    }
    const troop = { ...base, star: 1, count: 1, uid: Date.now() + Math.random() };
    this.inventory.push(troop);
    return troop;
  }
  getTroop(uid) { return this.inventory.find(i => i.uid === uid); }
  canUpgrade(troop) {
    const need = troop.star * 3;
    return (troop.count || 1) >= need;
  }
  upgrade(troop) {
    const need = troop.star * 3;
    if ((troop.count || 1) < need) return false;
    troop.count -= need;
    troop.star++;
    troop.hp = Math.floor(troop.hp * 1.15);
    troop.atk = Math.floor(troop.atk * 1.15);
    troop.armor = Math.floor(troop.armor * 1.1);
    this.upgradeCount++;
    this.checkAchievement("upgrade_5", this.upgradeCount >= 5);
    return true;
  }
  checkAchievement(id, condition) {
    if (condition && !this.achievements[id]) {
      this.achievements[id] = true;
      const ach = ACHIEVEMENTS.find(a => a.id === id);
      if (ach) {
        this.coins += ach.reward;
        showToast(`成就解锁: ${ach.name} +${ach.reward}金币`);
      }
    }
  }
  save() {
    const data = JSON.stringify({
      coins: this.coins, jade: this.jade, tokens: this.tokens,
      level: this.level, maxLevel: this.maxLevel, wins: this.wins,
      totalBattles: this.totalBattles, gachaCount: this.gachaCount,
      upgradeCount: this.upgradeCount, achievements: this.achievements,
      inventory: this.inventory.map(i => ({ id: i.id, star: i.star, count: i.count })),
      formation: this.formation.id, settings: this.settings
    });
    localStorage.setItem("liezhenqianqiu_save", data);
  }
  load() {
    const raw = localStorage.getItem("liezhenqianqiu_save");
    if (!raw) return;
    try {
      const data = JSON.parse(raw);
      this.coins = data.coins ?? 500;
      this.jade = data.jade ?? 10;
      this.tokens = data.tokens ?? 0;
      this.level = data.level ?? 1;
      this.maxLevel = data.maxLevel ?? 1;
      this.wins = data.wins ?? 0;
      this.totalBattles = data.totalBattles ?? 0;
      this.gachaCount = data.gachaCount ?? 0;
      this.upgradeCount = data.upgradeCount ?? 0;
      this.achievements = data.achievements ?? {};
      this.settings = data.settings ?? { sound: true, music: true, difficulty: 1 };
      if (data.inventory) {
        this.inventory = data.inventory.map(item => {
          const base = TROOPS_DATA.troops.find(t => t.id === item.id);
          if (!base) return null;
          const t = { ...base, star: item.star ?? 1, count: item.count ?? 1, uid: Date.now() + Math.random() };
          t.hp = Math.floor(base.hp * Math.pow(1.15, t.star - 1));
          t.atk = Math.floor(base.atk * Math.pow(1.15, t.star - 1));
          t.armor = Math.floor(base.armor * Math.pow(1.1, t.star - 1));
          return t;
        }).filter(Boolean);
      }
      if (data.formation) {
        const f = FORMATIONS.find(x => x.id === data.formation);
        if (f) this.formation = f;
      }
    } catch(e) {}
  }
}

// ==================== CANVAS RENDERER ====================
class Renderer {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.resize();
    window.addEventListener('resize', () => this.resize());
  }
  resize() {
    const maxW = window.innerWidth - 20;
    const maxH = window.innerHeight - 20;
    const aspect = 7 / 11;
    let w = maxW, h = maxW / aspect;
    if (h > maxH) { h = maxH; w = h * aspect; }
    this.canvas.width = Math.floor(w);
    this.canvas.height = Math.floor(h);
    this.cellW = this.canvas.width / 7;
    this.cellH = this.canvas.height / 11;
    this.dpr = window.devicePixelRatio || 1;
  }
  clear() {
    this.ctx.fillStyle = '#1a1008';
    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
  }
  drawGrid() {
    const ctx = this.ctx;
    ctx.strokeStyle = 'rgba(200, 160, 50, 0.15)';
    ctx.lineWidth = 1;
    for (let c = 0; c <= 7; c++) {
      ctx.beginPath();
      ctx.moveTo(c * this.cellW, 0);
      ctx.lineTo(c * this.cellW, this.canvas.height);
      ctx.stroke();
    }
    for (let r = 0; r <= 11; r++) {
      ctx.beginPath();
      ctx.moveTo(0, r * this.cellH);
      ctx.lineTo(this.canvas.width, r * this.cellH);
      ctx.stroke();
    }
  }
  drawRiver() {
    const ctx = this.ctx;
    const y = 5 * this.cellH;
    const h = this.cellH;
    ctx.fillStyle = 'rgba(40, 80, 120, 0.4)';
    ctx.fillRect(0, y, this.canvas.width, h);
    ctx.fillStyle = 'rgba(60, 120, 180, 0.3)';
    for (let i = 0; i < 7; i++) {
      const ox = (Date.now() / 20 + i * 30) % this.cellW;
      ctx.fillRect(i * this.cellW + ox - 10, y + h * 0.3, 20, h * 0.4);
    }
    ctx.strokeStyle = 'rgba(100, 160, 200, 0.5)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(this.canvas.width, y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, y + h);
    ctx.lineTo(this.canvas.width, y + h);
    ctx.stroke();
  }
  drawFerries() {
    const ctx = this.ctx;
    ctx.fillStyle = 'rgba(139, 90, 43, 0.6)';
    ctx.fillRect(0, 5 * this.cellH, this.cellW * 0.4, this.cellH);
    ctx.fillRect(this.canvas.width - this.cellW * 0.4, 5 * this.cellH, this.cellW * 0.4, this.cellH);
    ctx.fillStyle = '#c8a030';
    ctx.font = `${Math.max(12, this.cellH * 0.3)}px serif`;
    ctx.textAlign = 'center';
    ctx.fillText('渡', this.cellW * 0.2, 5.6 * this.cellH);
    ctx.fillText('渡', this.canvas.width - this.cellW * 0.2, 5.6 * this.cellH);
  }
  drawZones() {
    const ctx = this.ctx;
    ctx.fillStyle = 'rgba(200, 50, 50, 0.06)';
    ctx.fillRect(0, 0, this.canvas.width, 5 * this.cellH);
    ctx.fillStyle = 'rgba(50, 100, 200, 0.06)';
    ctx.fillRect(0, 6 * this.cellH, this.canvas.width, 5 * this.cellH);
    ctx.strokeStyle = 'rgba(200, 80, 80, 0.3)';
    ctx.strokeRect(2, 2, this.canvas.width - 4, 5 * this.cellH - 4);
    ctx.strokeStyle = 'rgba(80, 120, 200, 0.3)';
    ctx.strokeRect(2, 6 * this.cellH + 2, this.canvas.width - 4, 5 * this.cellH - 4);
  }
  drawTroop(troop, col, row, isEnemy, alpha=1) {
    const ctx = this.ctx;
    const x = col * this.cellW;
    const y = row * this.cellH;
    const w = troop.size === 3 ? this.cellW * 3 : troop.size === 2 ? this.cellW * 2 : this.cellW;
    const h = this.cellH;
    const cx = x + w / 2;
    const cy = y + h / 2;

    ctx.globalAlpha = alpha;
    const color = isEnemy ? '#c85050' : '#5080c8';
    const darkColor = isEnemy ? '#802020' : '#204080';

    // Background
    ctx.fillStyle = darkColor;
    ctx.fillRect(x + 2, y + 2, w - 4, h - 4);
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.strokeRect(x + 2, y + 2, w - 4, h - 4);

    // Rarity glow
    const rColor = RARITY_COLORS[troop.rarity] || '#aaa';
    ctx.shadowColor = rColor;
    ctx.shadowBlur = 8;

    // Icon
    ctx.fillStyle = rColor;
    ctx.font = `bold ${Math.max(14, h * 0.35)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const icon = ROLE_ICONS[troop.role] || '兵';
    ctx.fillText(icon, cx, cy - h * 0.1);

    ctx.shadowBlur = 0;

    // Name
    ctx.fillStyle = '#ffd700';
    ctx.font = `${Math.max(10, h * 0.18)}px sans-serif`;
    ctx.fillText(troop.name, cx, cy + h * 0.28);

    // HP bar
    const hpRatio = troop.currentHp / troop.maxHp;
    ctx.fillStyle = '#333';
    ctx.fillRect(x + 4, y + 4, w - 8, 5);
    ctx.fillStyle = hpRatio > 0.5 ? '#44cc44' : hpRatio > 0.25 ? '#ccaa22' : '#cc3333';
    ctx.fillRect(x + 4, y + 4, (w - 8) * hpRatio, 5);

    // Star
    if (troop.star > 1) {
      ctx.fillStyle = '#ffd700';
      ctx.font = `${Math.max(10, h * 0.18)}px sans-serif`;
      ctx.textAlign = 'left';
      ctx.fillText('★'.repeat(troop.star), x + 6, y + h * 0.55);
    }

    ctx.globalAlpha = 1;
  }
  drawDamageNumber(x, y, damage, isCrit) {
    const ctx = this.ctx;
    ctx.fillStyle = isCrit ? '#ff4444' : '#ffaa00';
    ctx.font = `bold ${isCrit ? 22 : 16}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(Math.floor(damage), x, y);
  }
  drawAttackLine(x1, y1, x2, y2) {
    const ctx = this.ctx;
    ctx.strokeStyle = 'rgba(255, 200, 50, 0.7)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }
  drawPlacementMarker(col, row, valid) {
    const ctx = this.ctx;
    const x = col * this.cellW;
    const y = row * this.cellH;
    ctx.fillStyle = valid ? 'rgba(50, 200, 50, 0.3)' : 'rgba(200, 50, 50, 0.3)';
    ctx.fillRect(x, y, this.cellW, this.cellH);
    ctx.strokeStyle = valid ? '#44cc44' : '#cc4444';
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, this.cellW, this.cellH);
  }
}

// ==================== BATTLE SYSTEM ====================
class BattleSystem {
  constructor(game, renderer) {
    this.game = game;
    this.renderer = renderer;
    this.state = 'deploy'; // deploy, battle, result
    this.playerUnits = [];
    this.enemyUnits = [];
    this.playerHp = 3;
    this.enemyHp = 3;
    this.turn = 0;
    this.animations = [];
    this.selectedTroop = null;
    this.placementRotation = 0; // 0=horizontal, 1=vertical
    this.battleSpeed = 1;
    this.selectedFormation = game.state.formation;
    this.roundDeployCount = 0;
    this.deadPlayerUnits = [];
  }
  start() {
    this.state = 'deploy';
    this.playerHp = 3;
    this.enemyHp = 3;
    this.playerUnits = [];
    this.enemyUnits = [];
    this.deadPlayerUnits = [];
    this.turn = 0;
    this.deployEnemy();
    showToast('布阵阶段：拖动兵种到下方蓝色区域');
  }
  deployEnemy() {
    const level = this.game.state.level;
    const count = Math.min(5 + Math.floor((level - 1) / 5), 10);
    const difficulty = this.game.state.settings.difficulty || 1;
    const diffMul = (1 + (level - 1) * 0.15) * difficulty;
    // Difficulty-based rarity filter
    let allowedRarities = ['普通'];
    if (level >= 3) allowedRarities.push('稀有');
    if (level >= 8) allowedRarities.push('史诗');
    if (level >= 15) allowedRarities.push('传说');
    let pool = TROOPS_DATA.troops.filter(t => allowedRarities.includes(t.rarity));
    if (pool.length === 0) pool = TROOPS_DATA.troops.filter(t => t.rarity === '普通');
    for (let i = 0; i < count; i++) {
      const base = pool[Math.floor(Math.random() * pool.length)];
      const unit = {
        ...base,
        uid: 'enemy_' + i,
        maxHp: Math.floor(base.hp * diffMul),
        currentHp: Math.floor(base.hp * diffMul),
        atk: Math.floor(base.atk * diffMul),
        armor: Math.floor(base.armor * diffMul),
        isEnemy: true,
        col: -1, row: -1,
        attackTimer: 0,
        skillTimer: 0,
        hasFirstStrike: true
      };
      // Random placement in enemy zone (rows 0-4)
      let placed = false;
      let attempts = 0;
      while (!placed && attempts < 50) {
        const c = Math.floor(Math.random() * (8 - unit.size));
        const r = Math.floor(Math.random() * 5);
        if (this.canPlace(unit, c, r, true)) {
          unit.col = c; unit.row = r;
          this.enemyUnits.push(unit);
          placed = true;
        }
        attempts++;
      }
    }
  }
  canPlace(unit, col, row, isEnemy) {
    const size = unit.size || 1;
    if (col < 0 || col + size > 7) return false;
    if (isEnemy) {
      if (row < 0 || row >= 5) return false;
    } else {
      if (row < 6 || row >= 11) return false;
    }
    const units = isEnemy ? this.enemyUnits : this.playerUnits;
    for (let i = 0; i < size; i++) {
      if (units.some(u => u !== unit && this.occupies(u, col + i, row))) return false;
    }
    return true;
  }
  occupies(unit, col, row) {
    if (unit.col < 0) return false;
    const size = unit.size || 1;
    if (row !== unit.row) return false;
    return col >= unit.col && col < unit.col + size;
  }
  placePlayerUnit(troopUid, col, row) {
    const troop = this.game.state.getTroop(troopUid);
    if (!troop) return false;
    const aliveCount = this.playerUnits.filter(u => u.troopUid === troopUid && u.currentHp > 0).length;
    if (aliveCount >= (troop.count || 1)) return false;

    const unit = {
      ...troop,
      troopUid: troopUid,
      uid: 'player_' + Date.now() + Math.random(),
      maxHp: troop.hp,
      currentHp: troop.hp,
      isEnemy: false,
      col: col, row: row,
      attackTimer: 0,
      skillTimer: 0,
      hasFirstStrike: true
    };
    if (!this.canPlace(unit, col, row, false)) return false;
    this.playerUnits.push(unit);
    return true;
  }
  rotatePlacement() {
    this.placementRotation = 1 - this.placementRotation;
  }
  startBattle() {
    if (this.playerUnits.length === 0) {
      showToast('请先放置至少一个兵种');
      return;
    }
    this.state = 'battle';
    this.turn = 0;
    this.battleTime = 0;
    this.maxBattleTime = 45; // seconds before forced round end
    showToast('战斗开始！');
    audio.attack();
  }
  update(dt) {
    if (this.state !== 'battle') return;
    this.battleTime += dt;
    const allUnits = [...this.playerUnits, ...this.enemyUnits];
    for (const u of allUnits) {
      if (u.currentHp <= 0) continue;
      u.attackTimer += dt * u.speed * this.battleSpeed;
      if (u.attackTimer >= 10) {
        u.attackTimer = 0;
        this.unitAttack(u);
      }
    }
    // Check round end
    const playerAlive = this.playerUnits.some(u => u.currentHp > 0);
    const enemyAlive = this.enemyUnits.some(u => u.currentHp > 0);
    const timeout = this.battleTime >= this.maxBattleTime;
    if (!playerAlive || !enemyAlive || timeout) {
      if (timeout) {
        // Timeout: compare total HP remaining
        const playerTotalHp = this.playerUnits.reduce((s, u) => s + Math.max(0, u.currentHp), 0);
        const enemyTotalHp = this.enemyUnits.reduce((s, u) => s + Math.max(0, u.currentHp), 0);
        if (playerTotalHp <= enemyTotalHp) this.playerHp--;
        if (enemyTotalHp <= playerTotalHp) this.enemyHp--;
        showToast('回合超时！按剩余血量判定');
      } else {
        if (!playerAlive) this.playerHp--;
        if (!enemyAlive) this.enemyHp--;
      }
      if (this.playerHp <= 0) {
        this.endBattle(false);
      } else if (this.enemyHp <= 0) {
        this.endBattle(true);
      } else {
        this.nextRound();
      }
    }
  }
  unitAttack(attacker) {
    const targets = attacker.isEnemy ? this.playerUnits : this.enemyUnits;
    const alive = targets.filter(t => t.currentHp > 0);
    if (alive.length === 0) return;

    // Find target in range
    let target = null;
    const range = attacker.range;
    const inRange = alive.filter(t => this.distance(attacker, t) <= range);
    if (inRange.length > 0) {
      target = inRange[Math.floor(Math.random() * inRange.length)];
    } else {
      // Move toward enemy
      target = alive.reduce((best, t) => {
        const d = this.distance(attacker, t);
        return d < best.dist ? { unit: t, dist: d } : best;
      }, { unit: alive[0], dist: Infinity }).unit;
      // Smart movement toward target
      let newRow = attacker.row;
      let newCol = attacker.col;
      if (target.row < attacker.row) newRow--;
      else if (target.row > attacker.row) newRow++;

      // If blocked by river, try ferry crossing
      if (newRow === 5 && attacker.col !== 0 && attacker.col !== 6) {
        newCol = attacker.col < 3 ? 0 : 6;
        newRow = attacker.row;
      }
      // Try crossing river via ferry
      if (attacker.row === 5 && (attacker.col === 0 || attacker.col === 6)) {
        newRow = target.row < attacker.row ? 4 : 6;
        newCol = attacker.col;
      }
      // If same row, move laterally toward target
      if (newRow === attacker.row) {
        if (target.col < attacker.col) newCol--;
        else if (target.col > attacker.col) newCol++;
      }
      // Boundary check
      if (newRow < 0 || newRow >= 11) newRow = attacker.row;
      if (newCol < 0 || newCol + (attacker.size || 1) > 7) newCol = attacker.col;

      if (this.canMoveTo(attacker, newCol, newRow)) {
        attacker.col = newCol;
        attacker.row = newRow;
      } else if (newCol !== attacker.col) {
        // Try original row with lateral move
        if (this.canMoveTo(attacker, newCol, attacker.row)) {
          attacker.col = newCol;
        }
      } else if (newRow !== attacker.row) {
        // Try original col with vertical move
        if (this.canMoveTo(attacker, attacker.col, newRow)) {
          attacker.row = newRow;
        }
      }
      if (this.distance(attacker, target) > range) return;
    }

    if (!target) return;

    // Calculate damage
    let dmg = attacker.atk;
    let isCrit = false;
    let multiplier = 1;

    // Counter bonus
    const tRoles = target.role ? [target.role] : [];
    const tId = target.id || '';
    if (attacker.counterBonus) {
      for (const bonus of attacker.counterBonus) {
        if (tId.includes(bonus) || tRoles.some(r => r.includes(bonus))) {
          multiplier = attacker.counterMultiplier;
          break;
        }
      }
    }

    // Skill effects
    if (attacker.skillEffect === 'first_strike' && attacker.hasFirstStrike) {
      multiplier *= 1.5;
      attacker.hasFirstStrike = false;
      isCrit = true;
    }
    if (attacker.skillEffect === 'charge_heavy' && attacker.hasFirstStrike) {
      multiplier *= 2.0;
      attacker.hasFirstStrike = false;
      isCrit = true;
    }
    if (attacker.skillEffect === 'charge_ultimate' && attacker.hasFirstStrike) {
      multiplier *= 2.0;
      attacker.hasFirstStrike = false;
      isCrit = true;
    }
    if (attacker.skillEffect === 'volley' || attacker.skillEffect === 'volley_heavy') {
      attacker.skillTimer++;
      if (attacker.skillTimer >= 3) {
        multiplier *= attacker.skillEffect === 'volley' ? 1.8 : 1.5;
        attacker.skillTimer = 0;
        isCrit = true;
      }
    }
    if (attacker.skillEffect === 'double_shot') {
      // Handled by extra attack speed
    }
    if (attacker.skillEffect === 'critical_strike' && Math.random() < 0.3) {
      multiplier *= 2.0;
      isCrit = true;
    }
    if (attacker.skillEffect === 'berserk' && attacker.currentHp / attacker.maxHp < 0.3) {
      multiplier *= 1.5;
    }

    // Armor reduction
    let armor = target.armor;
    if (attacker.skillEffect === 'armor_ignore') armor *= 0.7;
    if (attacker.skillEffect === 'pierce_heavy') armor *= 0.5;
    const reduction = armor / (armor + 50);
    dmg = dmg * multiplier * (1 - reduction);

    // Ranged damage reduction for shield units
    if (attacker.range > 1 && target.counterMultiplier < 1) {
      dmg *= target.counterMultiplier;
    }

    // Apply damage
    dmg = Math.max(1, Math.floor(dmg));
    target.currentHp -= dmg;

    // Animation
    this.animations.push({
      type: 'damage',
      x: (target.col + (target.size || 1) / 2) * this.renderer.cellW,
      y: target.row * this.renderer.cellH,
      value: dmg,
      isCrit,
      time: 1.0
    });
    this.animations.push({
      type: 'line',
      x1: (attacker.col + (attacker.size || 1) / 2) * this.renderer.cellW,
      y1: attacker.row * this.renderer.cellH + this.renderer.cellH / 2,
      x2: (target.col + (target.size || 1) / 2) * this.renderer.cellW,
      y2: target.row * this.renderer.cellH + this.renderer.cellH / 2,
      time: 0.3
    });

    audio.hit();

    if (target.currentHp <= 0) {
      target.currentHp = 0;
      this.animations.push({
        type: 'death', x: target.col * this.renderer.cellW,
        y: target.row * this.renderer.cellH,
        w: (target.size || 1) * this.renderer.cellW,
        h: this.renderer.cellH,
        time: 0.5
      });
    }
  }
  distance(a, b) {
    return Math.abs(a.col - b.col) + Math.abs(a.row - b.row);
  }
  canMoveTo(unit, col, row) {
    // Ferry crossing: allow row 5 only at ferry columns (0 and 6)
    const isFerry = (col === 0 || col === 6) && row === 5;
    if (row === 5 && !isFerry) return false;
    if (col < 0 || col + (unit.size || 1) > 7) return false;
    if (row < 0 || row >= 11) return false;
    const units = unit.isEnemy ? this.enemyUnits : this.playerUnits;
    for (let i = 0; i < (unit.size || 1); i++) {
      if (units.some(u => u !== unit && u.currentHp > 0 && this.occupies(u, col + i, row))) return false;
    }
    return true;
  }
  nextRound() {
    this.state = 'deploy';
    this.turn++;
    // Keep alive units, remove dead
    this.playerUnits = this.playerUnits.filter(u => u.currentHp > 0);
    this.enemyUnits = this.enemyUnits.filter(u => u.currentHp > 0);
    // Redeploy enemy
    this.enemyUnits.forEach(u => { u.col = -1; u.row = -1; });
    this.enemyUnits = [];
    this.deployEnemy();
    showToast(`第${this.turn + 1}轮布阵`);
  }
  endBattle(victory) {
    this.state = 'result';
    const state = this.game.state;
    state.totalBattles++;
    if (victory) {
      state.wins++;
      const baseReward = 50 + (state.level - 1) * 10;
      state.coins += baseReward;
      showToast(`胜利！获得 ${baseReward} 金币`);
      audio.win();
      state.level++;
      if (state.level > state.maxLevel) state.maxLevel = state.level;
      state.checkAchievement('first_win', state.wins >= 1);
      state.checkAchievement('win_10', state.wins >= 10);
      state.checkAchievement('win_50', state.wins >= 50);
      state.checkAchievement('level_10', state.maxLevel >= 10);
      state.checkAchievement('level_30', state.maxLevel >= 30);
      state.checkAchievement('rich', state.coins >= 5000);
    } else {
      const reward = 10 + state.level * 2;
      state.coins += reward;
      showToast(`失败... 获得 ${reward} 金币安慰奖`);
      audio.lose();
    }
    state.save();
    this.game.showBattleResult(victory);
  }
  render() {
    const r = this.renderer;
    r.clear();
    r.drawZones();
    r.drawGrid();
    r.drawRiver();
    r.drawFerries();

    // Units
    for (const u of this.enemyUnits) {
      if (u.currentHp > 0) r.drawTroop(u, u.col, u.row, true);
    }
    for (const u of this.playerUnits) {
      if (u.currentHp > 0) r.drawTroop(u, u.col, u.row, false);
    }

    // Animations
    for (let i = this.animations.length - 1; i >= 0; i--) {
      const a = this.animations[i];
      a.time -= 0.016;
      if (a.time <= 0) { this.animations.splice(i, 1); continue; }
      if (a.type === 'damage') {
        r.ctx.globalAlpha = Math.min(1, a.time * 2);
        r.drawDamageNumber(a.x, a.y - (1 - a.time) * 40, a.value, a.isCrit);
        r.ctx.globalAlpha = 1;
      } else if (a.type === 'line') {
        r.ctx.globalAlpha = a.time / 0.3;
        r.drawAttackLine(a.x1, a.y1, a.x2, a.y2);
        r.ctx.globalAlpha = 1;
      } else if (a.type === 'death') {
        r.ctx.globalAlpha = a.time / 0.5;
        r.ctx.fillStyle = 'rgba(255,100,50,0.5)';
        r.ctx.fillRect(a.x, a.y, a.w, a.h);
        r.ctx.globalAlpha = 1;
      }
    }
  }
}

// ==================== MAIN GAME ====================
class Game {
  constructor() {
    this.canvas = document.getElementById('gameCanvas');
    this.renderer = new Renderer(this.canvas);
    this.state = new GameState();
    this.audio = audio;
    this.screen = 'menu';
    this.battle = null;
    this.lastTime = 0;
    this.mouse = { x: 0, y: 0, down: false };
    this.dragTroop = null;
    this.hoveredCell = null;

    this.setupInput();
    this.loop = this.loop.bind(this);
    requestAnimationFrame(this.loop);
    this.showMainMenu();
  }
  setupInput() {
    const c = this.canvas;
    c.addEventListener('mousemove', e => {
      const rect = c.getBoundingClientRect();
      this.mouse.x = e.clientX - rect.left;
      this.mouse.y = e.clientY - rect.top;
      this.updateHover();
    });
    c.addEventListener('mousedown', e => {
      this.mouse.down = true;
      this.handleClick();
    });
    c.addEventListener('mouseup', () => { this.mouse.down = false; this.dragTroop = null; });
    c.addEventListener('touchstart', e => {
      e.preventDefault();
      const rect = c.getBoundingClientRect();
      const t = e.touches[0];
      this.mouse.x = t.clientX - rect.left;
      this.mouse.y = t.clientY - rect.top;
      this.mouse.down = true;
      this.handleClick();
    }, { passive: false });
    c.addEventListener('touchend', () => { this.mouse.down = false; this.dragTroop = null; });
    c.addEventListener('touchmove', e => {
      e.preventDefault();
      const rect = c.getBoundingClientRect();
      const t = e.touches[0];
      this.mouse.x = t.clientX - rect.left;
      this.mouse.y = t.clientY - rect.top;
      this.updateHover();
    }, { passive: false });
    c.addEventListener('contextmenu', e => e.preventDefault());
  }
  updateHover() {
    const r = this.renderer;
    const c = Math.floor(this.mouse.x / r.cellW);
    const row = Math.floor(this.mouse.y / r.cellH);
    this.hoveredCell = { c, row };
  }
  handleClick() {
    audio.click();
    if (this.screen === 'battle' && this.battle) {
      const b = this.battle;
      if (b.state === 'deploy') {
        const c = Math.floor(this.mouse.x / this.renderer.cellW);
        const r = Math.floor(this.mouse.y / this.renderer.cellH);
        if (this.dragTroop) {
          if (b.placePlayerUnit(this.dragTroop, c, r)) {
            showToast('已放置');
            this.dragTroop = null;
          } else {
            showToast('无法放置于此');
          }
        }
      }
    }
  }
  loop(timestamp) {
    const dt = Math.min((timestamp - this.lastTime) / 1000, 0.05);
    this.lastTime = timestamp;

    if (this.screen === 'battle' && this.battle) {
      this.battle.update(dt);
      this.battle.render();
    } else {
      this.renderer.clear();
      this.renderer.drawGrid();
      this.renderer.drawRiver();
    }

    requestAnimationFrame(this.loop);
  }
  showMainMenu() {
    this.screen = 'menu';
    const ui = document.getElementById('uiLayer');
    ui.innerHTML = `
      <div style="position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:auto;">

  showLevelSelect() {

  gacha(type) {
    const costs = { coin: 100, jade: 1, token: 1 };
    const currencies = { coin: 'coins', jade: 'jade', token: 'tokens' };
    if (this.state[currencies[type]] < costs[type]) {
      showToast('资源不足！'); return;
    }
    this.state[currencies[type]] -= costs[type];
    this.state.gachaCount++;
    this.state.checkAchievement('gacha_10', this.state.gachaCount >= 10);
    this.state.checkAchievement('gacha_50', this.state.gachaCount >= 50);
    audio.gacha();

    // Determine rarity
    let rarity;
    const rand = Math.random();
    if (type === 'token') {
      rarity = rand < 0.5 ? '传说' : '史诗';
    } else if (type === 'jade') {
      if (rand < 0.15) rarity = '传说';
      else if (rand < 0.45) rarity = '史诗';
      else rarity = '稀有';
    } else {
      if (rand < 0.03) rarity = '传说';
      else if (rand < 0.12) rarity = '史诗';
      else if (rand < 0.35) rarity = '稀有';
      else rarity = '普通';
    }

    const pool = TROOPS_DATA.troops.filter(t => t.rarity === rarity);
    const troop = pool[Math.floor(Math.random() * pool.length)];
    this.state.addTroop(troop.id);
    this.state.checkAchievement('legendary', rarity === '传说');
    this.state.save();

    const rColor = RARITY_COLORS[rarity];

function showToast(msg) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
